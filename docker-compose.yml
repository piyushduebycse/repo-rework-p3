version: '3.8'

services:
  # MySQL Database (Central host, schema-isolated)
  mysql:
    image: mysql:8.0
    container_name: revworkforce-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-databases.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - revworkforce-network

  # 1. Netflix Eureka Service Discovery
  service-discovery:
    build:
      context: .
      dockerfile: service-discovery/Dockerfile
    container_name: service-discovery
    ports:
      - "8761:8761"
    networks:
      - revworkforce-network
    restart: on-failure

  # 2. Config Server
  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - service-discovery
    networks:
      - revworkforce-network
    restart: on-failure

  # 3. User Service
  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    environment:
      MYSQL_HOST: mysql
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    networks:
      - revworkforce-network
    restart: on-failure

  # 4. Employee Management Service
  employee-service:
    build:
      context: .
      dockerfile: employee-service/Dockerfile
    container_name: employee-service
    environment:
      MYSQL_HOST: mysql
      SERVER_PORT: 8084
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
      service-discovery:
        condition: service_started
    networks:
      - revworkforce-network
    restart: on-failure

  # 5. API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - service-discovery
    networks:
      - revworkforce-network
    restart: on-failure

  # 6. Notification Service
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    environment:
      MYSQL_HOST: mysql
      SERVER_PORT: 8085
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - revworkforce-network
    restart: on-failure
    
  # 7. Leave Service
  leave-service:
    build:
      context: .
      dockerfile: leave-service/Dockerfile
    container_name: leave-service
    environment:
      MYSQL_HOST: mysql
      SERVER_PORT: 8086
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - revworkforce-network
    restart: on-failure

  # 8. Performance Service
  performance-service:
    build:
      context: .
      dockerfile: performance-service/Dockerfile
    container_name: performance-service
    environment:
      MYSQL_HOST: mysql
      SERVER_PORT: 8087
    ports:
      - "8087:8087"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - revworkforce-network
    restart: on-failure

  # 9. Reporting Service
  reporting-service:
    build:
      context: .
      dockerfile: reporting-service/Dockerfile
    container_name: reporting-service
    environment:
      MYSQL_HOST: mysql
      SERVER_PORT: 8088
    ports:
      - "8088:8088"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - revworkforce-network
    restart: on-failure

  # Frontend (Angular Application)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: revworkforce-frontend
    ports:
      - "80:80"
    depends_on:
      - api-gateway
    networks:
      - revworkforce-network
    restart: on-failure

volumes:
  mysql_data:

networks:
  revworkforce-network:
    driver: bridge
