# Server
server.port=8082
spring.application.name=leave-performance-service

# Database
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/revworkforce_db
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate

# JWT
app.jwt.secret=${JWT_SECRET:dGhpc2lzYTMyYnl0ZWtleXN1cGVyc2VjcmV0MTIzNDU=}
app.jwt.expiration-ms=86400000

# Log4j2
logging.config=classpath:log4j2.xml

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost}
