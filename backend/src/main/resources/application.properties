# Server
server.port=8080
spring.application.name=revworkforce

# Database
spring.datasource.url=jdbc:mysql://mysql:3306/revworkforce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=dGhpc2lzYTMyYnl0ZWtleXN1cGVyc2VjcmV0MTIzNDU=
app.jwt.expiration-ms=86400000

# Log4j2
logging.config=classpath:log4j2.xml

# CORS
app.cors.allowed-origins=http://localhost:4200
