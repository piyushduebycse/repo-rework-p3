server.port=${SERVER_PORT:8081}
spring.application.name=user-service

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# Database - Isolate schema specifically for users
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/revworkforce_user_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT
app.jwt.secret=${JWT_SECRET:dGhpc2lzYTMyYnl0ZWtleXN1cGVyc2VjcmV0MTIzNDU=}
app.jwt.expiration-ms=86400000

# Logging
logging.config=classpath:log4j2.xml
