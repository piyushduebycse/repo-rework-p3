# Server
server.port=8083
spring.application.name=notification-service

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/

# Database
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/revworkforce_notifications_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=${JWT_SECRET:dGhpc2lzYTMyYnl0ZWtleXN1cGVyc2VjcmV0MTIzNDU=}
app.jwt.expiration-ms=86400000

# Log4j2
logging.config=classpath:log4j2.xml

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:4200,http://localhost}
