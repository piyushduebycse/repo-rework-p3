<div class="page-container">
  <div class="page-header">
    <h1>My Leaves</h1>
    <button mat-raised-button color="primary" routerLink="../apply">
      <mat-icon>add</mat-icon> Apply for Leave
    </button>
  </div>

  <mat-card class="table-card">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z0">
      
      <ng-container matColumnDef="leaveTypeName">
        <th mat-header-cell *matHeaderCellDef> Type </th>
        <td mat-cell *matCellDef="let element"> {{element.leaveTypeName}} </td>
      </ng-container>

      <ng-container matColumnDef="startDate">
        <th mat-header-cell *matHeaderCellDef> Start Date </th>
        <td mat-cell *matCellDef="let element"> {{element.startDate | date}} </td>
      </ng-container>

      <ng-container matColumnDef="endDate">
        <th mat-header-cell *matHeaderCellDef> End Date </th>
        <td mat-cell *matCellDef="let element"> {{element.endDate | date}} </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let element"> 
          <span class="status-badge" [ngClass]="element.status.toLowerCase()">
            {{element.status}}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="appliedAt">
        <th mat-header-cell *matHeaderCellDef> Applied On </th>
        <td mat-cell *matCellDef="let element"> {{element.appliedAt | date}} </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <button mat-icon-button color="warn" 
                  *ngIf="element.status === 'PENDING' || element.status === 'APPROVED'" 
                  (click)="cancelLeave(element.id)"
                  title="Cancel Leave">
            <mat-icon>cancel</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div class="empty-state" *ngIf="dataSource.length === 0">
      <mat-icon>event_busy</mat-icon>
      <p>No leave applications found.</p>
    </div>
  </mat-card>
</div>
