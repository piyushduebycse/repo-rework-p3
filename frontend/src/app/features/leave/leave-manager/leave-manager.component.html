<div class="page-container">
  <div class="page-header">
    <h1>Team Leave Requests</h1>
  </div>

  <mat-card class="table-card">
    <table mat-table [dataSource]="dataSource" class="mat-elevation-z0">
      
      <ng-container matColumnDef="employeeName">
        <th mat-header-cell *matHeaderCellDef> Employee </th>
        <td mat-cell *matCellDef="let element"> 
          <strong>{{element.employeeName}}</strong>
        </td>
      </ng-container>

      <ng-container matColumnDef="leaveTypeName">
        <th mat-header-cell *matHeaderCellDef> Type </th>
        <td mat-cell *matCellDef="let element"> {{element.leaveTypeName}} </td>
      </ng-container>

      <ng-container matColumnDef="dates">
        <th mat-header-cell *matHeaderCellDef> Dates </th>
        <td mat-cell *matCellDef="let element"> 
          {{element.startDate | date:'MMM d'}} - {{element.endDate | date:'MMM d, y'}}
        </td>
      </ng-container>

      <ng-container matColumnDef="reason">
        <th mat-header-cell *matHeaderCellDef> Reason </th>
        <td mat-cell *matCellDef="let element" class="truncate-cell" [title]="element.reason"> 
          {{element.reason}} 
        </td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef> Status </th>
        <td mat-cell *matCellDef="let element"> 
          <span class="status-badge" [ngClass]="element.status.toLowerCase()">
            {{element.status}}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <div class="action-buttons" *ngIf="element.status === 'PENDING'">
            <button mat-icon-button class="btn-approve" (click)="approveLeave(element.id)" title="Approve">
              <mat-icon>check_circle</mat-icon>
            </button>
            <button mat-icon-button class="btn-reject" (click)="rejectLeave(element.id)" title="Reject">
              <mat-icon>cancel</mat-icon>
            </button>
          </div>
          <span *ngIf="element.status !== 'PENDING'" class="text-secondary text-sm">Actioned</span>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>

    <div class="empty-state" *ngIf="dataSource.length === 0">
      <mat-icon>inbox</mat-icon>
      <p>No team leave requests found.</p>
    </div>
  </mat-card>
</div>
