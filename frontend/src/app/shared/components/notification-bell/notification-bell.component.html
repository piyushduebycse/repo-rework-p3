<button mat-icon-button [matMenuTriggerFor]="notificationMenu" class="notification-btn" aria-label="Notifications">
  <mat-icon [matBadge]="unreadCount" matBadgeColor="warn" [matBadgeHidden]="unreadCount === 0">notifications</mat-icon>
</button>

<mat-menu #notificationMenu="matMenu" class="notification-menu">
  <div class="menu-header" (click)="$event.stopPropagation()">
    <h3>Notifications</h3>
    <button mat-button color="primary" *ngIf="unreadCount > 0" (click)="markAllAsRead($event)">Mark all as read</button>
  </div>
  <mat-divider></mat-divider>

  <div class="notification-list">
    <div *ngIf="notifications.length === 0" class="empty-state">
      <p>No new notifications</p>
    </div>

    <div *ngFor="let notification of notifications" 
         class="notification-item" 
         [class.unread]="!notification.isRead"
         (click)="handleNotificationClick(notification)">
      
      <div class="notification-icon" [ngClass]="notification.type.toLowerCase()">
        <mat-icon *ngIf="notification.type.includes('LEAVE')">event</mat-icon>
        <mat-icon *ngIf="notification.type.includes('REVIEW')">assessment</mat-icon>
        <mat-icon *ngIf="!notification.type.includes('LEAVE') && !notification.type.includes('REVIEW')">notifications</mat-icon>
      </div>
      
      <div class="notification-content">
        <p class="message">{{ notification.message }}</p>
        <span class="time">{{ notification.createdAt | date:'short' }}</span>
      </div>
      
      <button mat-icon-button class="mark-read-btn" 
              *ngIf="!notification.isRead" 
              (click)="markAsRead(notification, $event)"
              title="Mark as read">
        <mat-icon>done</mat-icon>
      </button>
    </div>
  </div>
</mat-menu>
